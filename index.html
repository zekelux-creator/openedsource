<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenedSource - Confiance Radicale</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;700&display=swap');
    :root { --primary: #3b82f6; --secondary: #ec4899; --bg-dark: #0f172a; --text: #f1f5f9; --border: #475569; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg-dark); color: var(--text); margin: 0; line-height: 1.6; }
    .nav { display: flex; justify-content: space-between; padding: 20px 50px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .logo { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .banana { font-size: 30px; animation: bounce 2s infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    section { padding: 80px 50px; max-width: 1200px; margin: auto; text-align: center; }
    h1 { font-family: 'Playfair Display', serif; font-size: 50px; margin-bottom: 20px; }
    h1 em { color: var(--secondary); font-style: italic; }
    .hero-img { width: 100%; max-width: 900px; border-radius: 20px; border: 1px solid var(--border); margin: 40px 0; }
    .btn { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 15px 40px; border-radius: 30px; text-decoration: none; font-weight: bold; font-size: 18px; display: inline-block; transition: 0.3s; }
    .btn:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(59,130,246,0.4); }
    .email-form { margin-top: 40px; }
    input { padding: 15px; border-radius: 8px; border: 1px solid var(--border); width: 300px; background: #1e293b; color: white; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="logo"><span class="banana">🍌</span> Opened<em>Source</em></div>
    <div style="color: var(--primary); font-weight: bold;">🎯 Liste d'attente ouverte</div>
  </nav>

  <section>
    <div style="text-transform: uppercase; letter-spacing: 2px; color: var(--primary); font-weight: bold; margin-bottom: 10px;">Confiance Radicale</div>
    <h1>La Fin des Secrets. <em>Confiance</em> pour Votre Couple.</h1>
    <p style="font-size: 18px; color: #cbd5e1; max-width: 700px; margin: auto;">Le premier SaaS mondial de partage d'écran et d'audio en temps réel, basé sur un consentement 100% mutuel.</p>
    
    <img src="preview1.webp" class="hero-img" alt="OpenedSource Design">
    
    <div class="email-form">
      <input type="email" placeholder="Ton adresse e-mail">
      <a href="#" class="btn">REJOINDRE LE MOUVEMENT</a>
    </div>

    <img src="preview 2.webp" class="hero-img" alt="Centre de Confiance">
  </section>

  <footer style="padding: 40px; border-top: 1px solid var(--border); text-align: center; font-size: 12px; color: #94a3b8;">
    © 2026 OpenedSource. Tous droits réservés.
  </footer>
</body>
</html>
